name: Build unsigned IPA & APK

on:
  push:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

env:
  FLUTTER_VERSION: "3.44.7"
  # Bump for a new minor/major series. The patch component always tracks
  # github.run_number, so it will not reset to 0 when this changes.
  VERSION_PREFIX: "1.0"

jobs:
  android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "${{ env.FLUTTER_VERSION }}"
          channel: stable
          cache: true
      - name: Cache pub packages
        uses: actions/cache@v4
        with:
          path: ~/.pub-cache
          key: pub-${{ runner.os }}-${{ hashFiles('pubspec.lock') }}
          restore-keys: |
            pub-${{ runner.os }}-
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('android/**/*.gradle*', 'android/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-
      - run: flutter pub get
      - name: Build split APKs
        run: >
          flutter build apk --release --split-per-abi
          --build-name=${{ env.VERSION_PREFIX }}.${{ github.run_number }}
          --build-number=${{ github.run_number }}
      - name: Rename APKs
        run: |
          V=${{ env.VERSION_PREFIX }}.${{ github.run_number }}
          cd build/app/outputs/flutter-apk
          for f in app-*-release.apk; do
            abi=${f#app-}
            abi=${abi%-release.apk}
            mv "$f" "vplayer-${V}-${abi}.apk"
          done
      - uses: actions/upload-artifact@v4
        with:
          name: android-apks
          path: build/app/outputs/flutter-apk/vplayer-*.apk

  ios:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "${{ env.FLUTTER_VERSION }}"
          channel: stable
          cache: true
      - name: Cache pub packages
        uses: actions/cache@v4
        with:
          path: ~/.pub-cache
          key: pub-${{ runner.os }}-${{ hashFiles('pubspec.lock') }}
          restore-keys: |
            pub-${{ runner.os }}-
      - name: Cache CocoaPods
        uses: actions/cache@v4
        with:
          path: |
            ios/Pods
            ~/Library/Caches/CocoaPods
          key: pods-${{ runner.os }}-${{ hashFiles('ios/Podfile.lock') }}
          restore-keys: |
            pods-${{ runner.os }}-
      - run: flutter pub get
      - name: Build unsigned .app
        run: >
          flutter build ios --release --no-codesign
          --build-name=${{ env.VERSION_PREFIX }}.${{ github.run_number }}
          --build-number=${{ github.run_number }}
      - name: Package unsigned IPA
        run: |
          V=${{ env.VERSION_PREFIX }}.${{ github.run_number }}
          cd build/ios/iphoneos
          mkdir Payload
          cp -R Runner.app Payload/Runner.app
          zip -qry "vplayer-${V}.ipa" Payload
      - uses: actions/upload-artifact@v4
        with:
          name: ios-ipa
          path: build/ios/iphoneos/vplayer-*.ipa

  release:
    needs: [android, ios]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.VERSION_PREFIX }}.${{ github.run_number }}
          name: v${{ env.VERSION_PREFIX }}.${{ github.run_number }}
          files: dist/**
          fail_on_unmatched_files: true
